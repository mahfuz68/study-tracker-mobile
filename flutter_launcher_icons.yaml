# flutter_launcher_icons configuration
# Run: dart run flutter_launcher_icons

flutter_launcher_icons:
  image_path: "logo.png"

  # ── Android ──────────────────────────────────────────────
  android: true
  adaptive_icon_foreground: "logo.png"
  adaptive_icon_background: "#079F70"

  # ── iOS (disabled — iOS project not set up) ──────────────
  ios: false
